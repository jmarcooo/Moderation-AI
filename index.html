<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Moderation Dashboard Mockup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .dashboard-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header {
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .input-section textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        button {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #004494;
        }
        .results-section {
            margin-top: 20px;
            padding: 15px;
            background-color: #eef2f5;
            border-radius: 4px;
            display: none; /* Hidden until submission */
        }
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
        .safe { background-color: #28a745; }
        .flagged { background-color: #dc3545; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h2>Content Review Console</h2>
            <p>Test the AI text moderation pipeline.</p>
        </div>

        <div class="input-section">
            <label for="userInput"><strong>Submit Content for Analysis:</strong></label><br><br>
            <textarea id="userInput" placeholder="Type a sample comment here... (e.g., 'This is a great post!' or 'You are an idiot!')"></textarea>
            <button onclick="simulateAIAnalysis()">Run AI Analysis</button>
        </div>

        <div class="results-section" id="resultsSection">
            <h3>AI Analysis Results</h3>
            <p><strong>Original Text:</strong> <span id="displayOriginal"></span></p>
            <p><strong>Toxicity Score:</strong> <span id="displayScore"></span>%</p>
            <p><strong>System Action:</strong> <span id="displayAction" class="status-badge"></span></p>
        </div>
    </div>

    <script>
        function simulateAIAnalysis() {
            const text = document.getElementById('userInput').value;
            if (!text) {
                alert("Please enter some text to analyze.");
                return;
            }

            // Show the results section
            document.getElementById('resultsSection').style.display = 'block';
            document.getElementById('displayOriginal').innerText = text;

            // --- SIMULATING THE AI API CALL ---
            // In a real application, you would use fetch() here to send 'text' 
            // to your backend, which then queries the Google Perspective API or OpenAI.
            
            // For this mockup, we generate a random "Toxicity Score" based on simple keyword detection
            let mockToxicityScore = Math.floor(Math.random() * 20); // Base low score
            
            const toxicKeywords = ['idiot', 'stupid', 'hate', 'dumb', 'kill'];
            const containsToxicWord = toxicKeywords.some(word => text.toLowerCase().includes(word));

            if (containsToxicWord) {
                mockToxicityScore = Math.floor(Math.random() * 20) + 80; // High score (80-99%)
            }

            document.getElementById('displayScore').innerText = mockToxicityScore;

            // Logic to determine action based on the AI's score
            const actionBadge = document.getElementById('displayAction');
            if (mockToxicityScore > 75) {
                actionBadge.innerText = "FLAGGED FOR HUMAN REVIEW";
                actionBadge.className = "status-badge flagged";
            } else {
                actionBadge.innerText = "AUTO-APPROVED";
                actionBadge.className = "status-badge safe";
            }
        }
    </script>

</body>
</html>
