<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multilingual AI Moderation</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .dashboard-container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .input-section textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; }
        
        button { background-color: #0056b3; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        button:hover { background-color: #004494; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        .results-section { margin-top: 20px; padding: 15px; background-color: #eef2f5; border-radius: 4px; }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 15px; color: white; font-weight: bold; font-size: 14px; }
        .safe { background-color: #28a745; }
        .flagged { background-color: #dc3545; }
        
        #loadingBar { color: #d97706; font-weight: bold; padding: 10px; background: #fef3c7; border-radius: 4px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h2>Local Content Review Console</h2>
            <p>Multilingual Zero-Shot Machine Learning (Supports Tagalog & Chinese).</p>
        </div>

        <div id="loadingBar">⚙️ Downloading Multilingual AI Engine... This model is larger, please be patient.</div>

        <div class="input-section">
            <label for="userInput"><strong>Submit Content for Analysis:</strong></label><br><br>
            <textarea id="userInput" placeholder="Paste Tagalog, Chinese, or English comments here..."></textarea>
            <button id="analyzeBtn" disabled>Run AI Analysis</button> 
        </div>

        <div class="results-section" id="resultsSection" style="display: none;">
            <h3 id="statusText">Results</h3>
            <div id="resultsContent">
                <p><strong>System Action:</strong> <span id="displayAction" class="status-badge"></span></p>
                <p><strong>Primary Violation:</strong> <span id="displayCategory">N/A</span></p>
                <p><strong>Raw JSON Log:</strong></p>
                <pre id="displayJson" style="background: #333; color: #fff; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px;"></pre>
            </div>
        </div>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.8.0';

        env.allowLocalModels = false;

        let classifier;

        async function loadModel() {
            try {
                // Swapped to a Multilingual Zero-Shot model
                classifier = await pipeline('zero-shot-classification', 'Xenova/mDeBERTa-v3-base-xnli-multilingual-nli-2mil7');
                
                document.getElementById('loadingBar').style.display = 'none';
                document.getElementById('analyzeBtn').disabled = false;
                document.getElementById('analyzeBtn').innerText = "Run AI Analysis";
            } catch (error) {
                console.error("Failed to load model:", error);
                document.getElementById('loadingBar').innerText = "❌ Error loading AI. Check console.";
            }
        }

        async function runLocalAIAnalysis() {
            const text = document.getElementById('userInput').value;
            if (!text) {
                alert("Please enter some text to analyze.");
                return;
            }

            document.getElementById('resultsSection').style.display = 'block';
            document.getElementById('resultsContent').style.display = 'none';
            document.getElementById('statusText').innerText = "Analyzing locally...";

            try {
                // We define the categories. The AI translates the text internally and scores it against these.
                const labels = ['toxic', 'safe'];
                const output = await classifier(text, labels);
                
                let isFlagged = false;
                let rawScores = {};

                // Reformat the output for our dashboard
                for (let i = 0; i < output.labels.length; i++) {
                    rawScores[output.labels[i]] = output.scores[i];
                }

                // Threshold Logic: If the model is more than 60% sure it belongs in the 'toxic' bucket
                if (rawScores['toxic'] > 0.5) {
                    isFlagged = true;
                }

                // Update UI: Populate Data
                document.getElementById('statusText').innerText = "AI Analysis Results";
                document.getElementById('resultsContent').style.display = 'block';
                
                const actionBadge = document.getElementById('displayAction');
                const categoryDisplay = document.getElementById('displayCategory');

                if (isFlagged) {
                    actionBadge.innerText = "FLAGGED FOR HUMAN REVIEW";
                    actionBadge.className = "status-badge flagged";
                    categoryDisplay.innerText = "TOXICITY DETECTED";
                } else {
                    actionBadge.innerText = "AUTO-APPROVED";
                    actionBadge.className = "status-badge safe";
                    categoryDisplay.innerText = "None detected";
                }

                document.getElementById('displayJson').innerText = JSON.stringify(rawScores, null, 2);

            } catch (error) {
                console.error("Analysis Error:", error);
                document.getElementById('statusText').innerText = "Error analyzing text.";
            }
        }

        document.getElementById('analyzeBtn').addEventListener('click', runLocalAIAnalysis);
        loadModel();
    </script>

</body>
</html>
